<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Фибоначчи</title>
</head>
<body>
    <h3>Последовательность Фибоначчи</h3>
    <script>
        function Fibonacci(n)
        {
            if (n === 0) return 0;
            if (n === 1) return 1;
            return Fibonacci(n - 1) + Fibonacci(n - 2);
        }
        let input = prompt("Введите число: ");
        if (input !== null && !isNaN(input) && Number.isInteger(+input) && +input >= 0)
        {
            let n = +input;
            for (let i = 0; i < n; i++)
            {
                 document.write(Fibonacci(i) + " ");

            }
           
        }
        else if (input !== null)
        {
            document.write(`Вы ввели некорректное число!`);
        }
    </script>
</body>
</html>
