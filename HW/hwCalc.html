<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="hwCalc.css">
    <title>Калькулятор</title>
</head>
<body>
    <div class="grid">
        <div class="title"> <img src="CalcXP.ico" class="app-icon" /></div>
        <div class="title"> КАЛЬКУЛЯТОР</div>
        <button class="control-button">&#x1F5D5;</button>
        <button class="control-button" disabled>&#128470;</button>
        <button class="control-button">&#10006;</button>
        <input type="text" id="display" value=0 style="grid-column:1/-1;" />
        <button class="button-memory">MC</button>
        <button class="button-memory">MR</button>
        <button class="button-memory">MS</button>
        <button class="button-memory">M+</button>
        <button class="button-memory">M-</button>
        <button class="button-memory">&larr;</button>
        <button class="button-memory">CE</button>
        <button class="button-memory">C</button>
        <button class="button-memory">&plusmn;</button>
        <button class="button-memory">&radic;</button>
        <button class="button-dighit">7</button>
        <button class="button-dighit">8</button>
        <button class="button-dighit">9</button>
        <button class="button-operator">&#247;</button>
        <button class="button-operator">%</button>
        <button class="button-dighit">4</button>
        <button class="button-dighit">5</button>
        <button class="button-dighit">6</button>
        <button class="button-operator">&#215;</button>
        <button class="button-operator">1/X</button>
        <button class="button-dighit">1</button>
        <button class="button-dighit">2</button>
        <button class="button-dighit">3</button>
        <button class="button-operator">&#8722;</button>
        <button class="button-operator button-equal">=</button>
        <button class="button-dighit button-zero">0</button>
        <button class="button-operator">.</button>
        <button class="button-operator">&#43;</button>
    </div>
</body>
</html>
